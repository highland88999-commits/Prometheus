<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyberpunk Anvil Crush</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #020208; /* Deep cyberpunk night sky */
        }
        canvas {
            display: block;
        }
    </style>
</head>
<body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        // 1. Scene Setup
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x020208, 0.03); // Fog for depth

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(15, 10, 15);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        // 2. Cyberpunk Lighting
        const ambientLight = new THREE.AmbientLight(0x111122, 1); // Dark blue ambient
        scene.add(ambientLight);

        // Neon Pink Light (Rim/Fill)
        const pinkLight = new THREE.PointLight(0xff00ff, 2, 50);
        pinkLight.position.set(-5, 10, -5);
        scene.add(pinkLight);

        // Neon Cyan Light (Main/Key)
        const cyanLight = new THREE.SpotLight(0x00ffff, 2);
        cyanLight.position.set(5, 15, 5);
        cyanLight.castShadow = true;
        scene.add(cyanLight);

        // 3. Environment Grid (Holo-deck vibe)
        const gridHelper = new THREE.GridHelper(40, 40, 0xff00ff, 0x440044);
        gridHelper.position.y = -0.5;
        scene.add(gridHelper);

        // 4. Constructing the Pinion (Gear)
        const pinionGroup = new THREE.Group();
        
        // Gear Material - glowing cyan metal
        const pinionMaterial = new THREE.MeshStandardMaterial({ 
            color: 0x00ffff, 
            metalness: 0.8, 
            roughness: 0.2,
            emissive: 0x004444
        });

        // Main cylinder
        const gearBodyGeometry = new THREE.CylinderGeometry(2, 2, 1, 16);
        const gearBody = new THREE.Mesh(gearBodyGeometry, pinionMaterial);
        gearBody.castShadow = true;
        pinionGroup.add(gearBody);

        // Gear teeth
        for (let i = 0; i < 8; i++) {
            const toothGeom = new THREE.BoxGeometry(0.8, 1, 1.5);
            const tooth = new THREE.Mesh(toothGeom, pinionMaterial);
            const angle = (i / 8) * Math.PI * 2;
            tooth.position.x = Math.cos(angle) * 2;
            tooth.position.z = Math.sin(angle) * 2;
            tooth.rotation.y = -angle;
            tooth.castShadow = true;
            pinionGroup.add(tooth);
        }
        
        pinionGroup.position.y = 0;
        scene.add(pinionGroup);

        // 5. Constructing the Cyberpunk Anvil
        const anvilGroup = new THREE.Group();
        
        // Dark, scuffed metal material
        const anvilMaterial = new THREE.MeshStandardMaterial({
            color: 0x222222,
            metalness: 0.9,
            roughness: 0.4
        });

        // Anvil base
        const baseGeom = new THREE.BoxGeometry(4, 1, 3);
        const base = new THREE.Mesh(baseGeom, anvilMaterial);
        base.position.y = 0.5;
        base.castShadow = true;
        anvilGroup.add(base);

        // Anvil middle (waist)
        const midGeom = new THREE.BoxGeometry(2, 2, 2);
        const mid = new THREE.Mesh(midGeom, anvilMaterial);
        mid.position.y = 2;
        mid.castShadow = true;
        anvilGroup.add(mid);

        // Anvil top
        const topGeom = new THREE.BoxGeometry(5, 1.5, 3);
        const topBlock = new THREE.Mesh(topGeom, anvilMaterial);
        topBlock.position.y = 3.75;
        topBlock.castShadow = true;
        anvilGroup.add(topBlock);

        // Anvil horn (the pointy bit)
        const hornGeom = new THREE.CylinderGeometry(0.1, 1.5, 3, 16);
        const horn = new THREE.Mesh(hornGeom, anvilMaterial);
        horn.rotation.z = Math.PI / 2;
        horn.position.set(4, 3.75, 0);
        horn.castShadow = true;
        anvilGroup.add(horn);

        scene.add(anvilGroup);

        // 6. Animation Loop & Logic
        const clock = new THREE.Clock();
        const CYCLE_DURATION = 1.5; // Seconds per crush cycle

        function animate() {
            requestAnimationFrame(animate);

            const elapsedTime = clock.getElapsedTime();
            const timeInCycle = elapsedTime % CYCLE_DURATION;
            const progress = timeInCycle / CYCLE_DURATION;

            // Constantly rotate the pinion for a mechanical feel
            pinionGroup.rotation.y += 0.02;

            // Phase 1: Falling (0.0 to 0.4)
            if (progress < 0.4) {
                const t = progress / 0.4;
                // Quadratic easing in (accelerating fall)
                anvilGroup.position.y = 12 - (9.5 * (t * t)); 
                pinionGroup.scale.y = 1;
            } 
            // Phase 2: The Crush (0.4 to 0.5)
            else if (progress < 0.5) {
                anvilGroup.position.y = 2.5; // Impact point
                const t = (progress - 0.4) / 0.1;
                // Squash the pinion down to 10% of its height
                pinionGroup.scale.y = 1 - (0.9 * t); 
            } 
            // Phase 3: Recoil & Reset (0.5 to 1.0)
            else {
                const t = (progress - 0.5) / 0.5;
                // Quadratic easing out (decelerating rise)
                anvilGroup.position.y = 2.5 + (9.5 * (1 - Math.pow(1 - t, 2))); 
                // Pinion springs back to original shape
                pinionGroup.scale.y = 0.1 + (0.9 * t);
            }

            renderer.render(scene, camera);
        }

        // Handle window resizing
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Start the loop
        animate();
    </script>
</body>
</html>
